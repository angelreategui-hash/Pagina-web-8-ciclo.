<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rincón de Lectura Virtual</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <header class="encabezado">
    <img src="imagenes/unl logo.png" alt="Logo UNL" class="logo">

    <div class="titulo-proyecto">
      <h1>Cuentos de Nuestra Comunidad</h1>
      <p>Carrera de Pedagogía de las Ciencias Experimentales Informática</p>
    </div>

    <img src="imagenes/logo UE.png" alt="Logo Institución" class="logo">
  </header>

  <nav class="menu">
    <a href="index.html">Inicio</a>
    <a href="#">Nuestra Comunidad</a>
    <a href="#">Biblioteca</a>
    <a href="#">Juegos</a>
  </nav>
<main class="contenedor-cuentos">   

  <!-- VIDEO CUENTO -->
  <div class="tarjeta-cuento">
  <h2>VIDEO CUENTO</h2>

  <div class="video-miniatura">

    <iframe
      width="100%"
      height="500"
      src="https://www.youtube.com/embed/t9pp8V95Xvs"
      title="Video Cuento"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>

  </div>
</div>

</div>

    
  <!-- LIBRO DIGITAL -->
  <div class="tarjeta-cuento">

    <h2>LIBRO DIGITAL</h2>

    <p>
      Aquí podrás visualizar el cuento digital en formato PDF.
    </p>

    <a href="PDF/Libro digital..pdf " class="boton">Ver Libro</a>

  </div>

  <!-- AUDIO CUENTO -->
  <div class="tarjeta-cuento">

    <h2>AUDIO CUENTO</h2>

  <p>
    Aquí podrás escuchar el audio cuento narrado.
  </p>

  <audio controls style="width: 100%; margin-top: 10px;">
    <source src="Audio/lafiestadelachonta.mp3.mp3" type="audio/mpeg">
    Tu navegador no soporta la reproducción de audio.
  </audio>

</div>

</main>

</body>
</html>
